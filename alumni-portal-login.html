<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AlumniConnect</title>
    <link rel="stylesheet" href="portal-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Page -->
    <div class="auth-page" id="loginPage">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-branding">
                    <div class="logo-large">
                        <i class="fas fa-graduation-cap"></i>
                        <span>AlumniConnect</span>
                    </div>
                    <h2>Welcome Back!</h2>
                    <p>Connect with your alumni network and unlock endless opportunities</p>
                    <div class="auth-features">
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Access mentorship programs</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Explore job opportunities</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Join discussion forums</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="auth-right">
                <div class="auth-form-container">
                    <a href="alumni-portal-landing.html" class="auth-back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
                    <h2>Sign In</h2>
                    <p class="auth-subtitle">Enter your credentials to access your account</p>
                    
                    <form class="auth-form" id="loginForm">
                        <div class="role-selection">
                            <label>I am a:</label>
                            <div class="role-buttons">
                                <button type="button" class="role-btn active" data-role="student">
                                    <i class="fas fa-user-graduate"></i>
                                    <span>Student</span>
                                </button>
                                <button type="button" class="role-btn" data-role="alumni">
                                    <i class="fas fa-user-tie"></i>
                                    <span>Alumni</span>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-with-icon">
                                <i class="fas fa-envelope"></i>
                                <input type="email" name="email" placeholder="your.email@example.com" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-with-icon">
                                <i class="fas fa-lock"></i>
                                <input type="password" name="password" placeholder="Enter your password" required>
                            </div>
                        </div>
                        
                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="btn-auth">Sign In</button>
                    </form>
                    
                    <div class="auth-divider">
                        <span>or</span>
                    </div>
                    
                    <div class="social-login">
                        <button class="social-btn google">
                            <i class="fab fa-google"></i>
                            Continue with Google
                        </button>
                        <button class="social-btn linkedin">
                            <i class="fab fa-linkedin"></i>
                            Continue with LinkedIn
                        </button>
                    </div>
                    
                    <p class="auth-switch">
                        Don't have an account? <a href="alumni-portal-register.html">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="portal-api.js"></script>
    <script src="portal-script.js"></script>
</body>
</html>
