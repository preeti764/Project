<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AlumniConnect</title>
    <link rel="stylesheet" href="portal-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Register Page -->
    <div class="auth-page" id="registerPage">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-branding">
                    <div class="logo-large">
                        <i class="fas fa-graduation-cap"></i>
                        <span>AlumniConnect</span>
                    </div>
                    <h2>Join Our Community!</h2>
                    <p>Create your account and start connecting with alumni or students today</p>
                    <div class="auth-features">
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Free to join</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Instant access to network</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-check-circle"></i>
                            <span>Secure and private</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="auth-right">
                <div class="auth-form-container">
                    <a href="alumni-portal-landing.html" class="auth-back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
                    <h2>Create Account</h2>
                    <p class="auth-subtitle">Fill in your details to get started</p>
                    
                    <form class="auth-form" id="registerForm">
                        <div class="role-selection">
                            <label>I am a:</label>
                            <div class="role-buttons">
                                <button type="button" class="role-btn active" data-role="student">
                                    <i class="fas fa-user-graduate"></i>
                                    <span>Student</span>
                                </button>
                                <button type="button" class="role-btn" data-role="alumni">
                                    <i class="fas fa-user-tie"></i>
                                    <span>Alumni</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" name="firstName" placeholder="John" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" name="lastName" placeholder="Doe" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-with-icon">
                                <i class="fas fa-envelope"></i>
                                <input type="email" name="email" placeholder="your.email@example.com" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-with-icon">
                                <i class="fas fa-lock"></i>
                                <input type="password" name="password" placeholder="Create a strong password" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="input-with-icon">
                                <i class="fas fa-lock"></i>
                                <input type="password" name="confirmPassword" placeholder="Re-enter your password" required>
                            </div>
                        </div>
                        
                        <label class="checkbox-label">
                            <input type="checkbox" required>
                            <span>I agree to the Terms of Service and Privacy Policy</span>
                        </label>
                        
                        <button type="submit" class="btn-auth">Create Account</button>
                    </form>
                    
                    <p class="auth-switch">
                        Already have an account? <a href="alumni-portal-login.html">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="portal-api.js"></script>
    <script src="portal-script.js"></script>
</body>
</html>
